<section class="mx-auto max-w-6xl px-0 pb-10 pt-6 sm:px-8 sm:pt-10">
  @if (isLoading()) {
    <div class="space-y-6">
      <div class="h-10 w-36 animate-pulse rounded-full bg-slate-200"></div>
      <div class="h-8 w-3/4 animate-pulse rounded-xl bg-slate-200"></div>
      <div class="h-[70vh] animate-pulse rounded-3xl bg-slate-200"></div>
    </div>
  } @else if (crossword() && safePuzzleUrl()) {
    <div class="space-y-6">
      <a
        class="inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white/80 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-500 hover:text-slate-900"
        routerLink="/"
      >
        <ng-icon name="heroArrowLeftSolid"></ng-icon>
        Back to all crosswords
      </a>

      <header class="space-y-3">
        <h1 class="text-3xl font-bold text-slate-900 sm:text-4xl">{{ crossword()!.title }}</h1>
        <p class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">
          By {{ crossword()!.author }}
        </p>
      </header>

      <!-- <div
        class="overflow-hidden rounded-3xl border border-white/60 bg-white/80 p-2 shadow-xl backdrop-blur sm:p-4"
      > -->
      <iframe
        class="h-[72vh] w-full rounded-2xl border border-slate-200 bg-white"
        [src]="safePuzzleUrl()"
        title="Crossword puzzle"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
      <!-- </div> -->
    </div>
  }
</section>
